<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>

    <link rel="stylesheet" href="sign_in.css">
</head>

<body>

    <div class="container">

        <form class="login-form" action="dashboard.html">

            <h1>Admin Dashboard</h1>

            <p class="subtitle">
                Sign in to continue
            </p>

            <div class="input-group">

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    autocomplete="email"
                    required>

            </div>

            <div class="input-group">

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required>

            </div>

            <div class="extra">

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button type="submit">
                Sign In
            </button>

        </form>

    </div>

</body>

</html>
